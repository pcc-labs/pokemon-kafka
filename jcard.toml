# jcard.toml — stereOS VM configuration for Pokemon Agent

mixtape = "opencode-mixtape:latest"

name = "pokemon-agent"

[resources]
cpus   = 4
memory = "8GiB"
disk   = "30GiB"

[network]
mode = "nat"

# Uncomment for LLM-powered strategy:
# mode = "nat"
# egress_allow = ["api.anthropic.com"]

[[shared]]
host = "./"
guest = "/workspace"
readonly = false

[env]
# Paper (paperd) records LLM sessions; the agent reaches it via this URL,
# inherited from the host where paperd runs. Read by scripts/paper_reader.py.
ANTHROPIC_BASE_URL = "${ANTHROPIC_BASE_URL}"

[secrets]
ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY}"

[agent]
harness = "claude-code"
prompt = "bash /workspace/scripts/entrypoint.sh"
workdir = "/workspace"
restart = "no"
