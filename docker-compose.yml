services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:29092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Session recording is handled by Paper (paperd) on the host — there is no
  # local LLM proxy. The agent.telemetry.raw stream and its consumers were
  # retired with the Tapes proxy; game-event telemetry (agent.game.events)
  # below remains the live Kafka feed.

  alerts-consumer:
    build: docker/alerts-consumer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: agent.telemetry.alerts
      KAFKA_GROUP_ID: alerts-consumer
      MEMORY_DIR: /memory
    volumes:
      - ./pokedex/memory:/memory
      - ./scripts/memory_writer.py:/app/memory_writer.py

  game-consumer:
    build: docker/game-consumer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: agent.game.events
      KAFKA_GROUP_ID: game-consumer
      SINK_DIR: /data/game
    volumes:
      - ./data/game:/data/game

  flink-jobmanager:
    image: flink:1.18
    ports:
      - "8081:8081"
    command: jobmanager
    volumes:
      - flink-lib:/opt/flink/lib
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager

  flink-taskmanager:
    image: flink:1.18
    depends_on:
      - flink-jobmanager
    command: taskmanager
    volumes:
      - flink-lib:/opt/flink/lib
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4

  # Downloads the Kafka connector JAR required by Flink SQL.
  # The flink:1.18 image does NOT include it by default.
  flink-kafka-connector:
    image: flink:1.18
    volumes:
      - flink-lib:/opt/flink/lib
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Downloading Flink Kafka connector..."
        curl -fSL https://repo1.maven.org/maven2/org/apache/flink/flink-sql-connector-kafka/3.1.0-1.18/flink-sql-connector-kafka-3.1.0-1.18.jar \
          -o /opt/flink/lib/flink-sql-connector-kafka-3.1.0-1.18.jar
        echo "Done."

  flink-sql-client:
    image: flink:1.18
    depends_on:
      flink-jobmanager:
        condition: service_started
      flink-taskmanager:
        condition: service_started
      flink-kafka-connector:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    volumes:
      - ./docker/flink-sql:/opt/flink-sql
      - flink-lib:/opt/flink/lib
    command: ["/bin/bash", "/opt/flink-sql/submit-jobs.sh"]
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager

volumes:
  flink-lib:
