<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokédex Viewer</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="pokedex">
  <!-- Grid overview: shown when data-view="grid" -->
  <div id="grid"></div>

  <!-- Focus view: a clamshell Pokédex — shown when data-view="focus" -->
  <div class="pokedex-shell">

    <!-- LEFT HALF: the Pokédex "face" -->
    <div class="dex-left">
      <div class="dex-topbar">
        <div class="big-lens"><span class="lens-glint"></span></div>
        <div class="led-cluster">
          <span class="led red"></span>
          <span class="led yellow"></span>
          <span class="led green"></span>
        </div>
      </div>

      <div class="screen-frame">
        <div class="screen-dots"><span></span><span></span></div>
        <div class="screen-bezel">
          <img id="screen" src="" alt="Gameplay Frame" />
        </div>
        <div class="screen-vents"><span></span><span></span><span></span></div>
      </div>

      <div class="dex-controls">
        <div class="ctrl-left">
          <div class="round-btn black"></div>
          <div class="round-btn red"></div>
          <div class="green-bar"></div>
        </div>
        <div class="dpad">
          <span class="dpad-h"></span>
          <span class="dpad-v"></span>
        </div>
      </div>

      <div class="scrub-container">
        <label for="scrub">Playback &middot; [ slower ] faster &middot; space = pause &middot; <span id="turn-readout">Turn 0</span></label>
        <input id="scrub" type="range" min="0" max="0" value="0" />
      </div>
    </div>

    <!-- HINGE -->
    <div class="dex-hinge"></div>

    <!-- RIGHT HALF: the data / keypad page -->
    <div class="dex-right">
      <div class="dex-right-head">
        <h1>Pokédex</h1>
        <button id="back-btn" onclick="showGrid()">&#8592; Runs</button>
      </div>
      <div id="stats-bar">
        <span id="sb-run"></span>
        <span id="sb-tier"></span>
        <span id="sb-turn"></span>
        <span id="sb-battles"></span>
        <span id="sb-maps"></span>
      </div>
      <div class="filter-chips">
        <button class="chip" data-kind="milestone">Milestone</button>
        <button class="chip" data-kind="telemetry">Telemetry</button>
        <button class="chip" data-kind="observation">Observation</button>
        <button class="chip" data-kind="anomaly">Anomaly</button>
        <button class="chip" data-kind="decision">Decision</button>
      </div>
      <ul id="feed"></ul>
    </div>

    <!-- THIRD COLUMN: agent state panel -->
    <div id="state-panel">
      <h2>Agent State</h2>
      <div class="state-section"><h3>Policy</h3><pre id="st-policy">no agent state</pre></div>
      <div class="state-section"><h3>Plan</h3><pre id="st-plan"></pre></div>
      <div class="state-section"><h3>Memory</h3><pre id="st-memory"></pre></div>
      <div class="state-section"><h3>Status</h3><pre id="st-status"></pre></div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
